version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: autoops
      POSTGRES_USER: autoops
      POSTGRES_PASSWORD: autoops
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
    ports:
      - "4000:4000"

  worker:
    build:
      context: .
      dockerfile: ./apps/worker/Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:4000
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  postgres-data:

