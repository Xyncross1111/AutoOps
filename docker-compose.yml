services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: autoops
      POSTGRES_USER: autoops
      POSTGRES_PASSWORD: autoops
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoops -d autoops"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"

  worker:
    build:
      context: .
      dockerfile: ./apps/worker/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/autoops-managed:/opt/autoops-managed
    networks:
      - default
      - managed

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${API_BASE_URL:-http://localhost:4000}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:80"

  caddy:
    image: caddy:2.8-alpine
    container_name: autoops-caddy
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/autoops-managed/caddy/sites:/etc/caddy/sites
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - default
      - managed

volumes:
  caddy-config:
  caddy-data:
  postgres-data:

networks:
  managed:
    name: autoops-managed
